<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1080px; overflow:hidden; position:relative; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.bg { width:100%; height:100%; object-fit:cover; display:block; }
.overlay { position:absolute; bottom:0; left:0; right:0; height:58%; background:linear-gradient(to bottom, transparent 0%, rgba(10,22,40,0.65) 20%, rgba(10,22,40,0.93) 50%, rgba(10,22,40,0.98) 100%); padding:0 56px 56px; display:flex; flex-direction:column; justify-content:flex-end; }
.logo-row { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
.logo-mark { width:52px; height:52px; background:#E8A820; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:18px; color:#0D2137; }
.logo-text { font-size:26px; font-weight:800; color:#fff; letter-spacing:3px; }
.logo-text span { color:#E8A820; }
.headline { font-size:52px; font-weight:800; color:#fff; line-height:1.15; margin-bottom:18px; letter-spacing:-0.5px; }
.headline em { font-style:normal; color:#1A7A5A; }
.sub { font-size:20px; color:rgba(255,255,255,0.75); line-height:1.6; margin-bottom:20px; }
.cta { display:inline-block; background:#1A7A5A; color:#0A1628; font-size:17px; font-weight:800; padding:16px 36px; border-radius:10px; letter-spacing:0.5px; margin-bottom:16px; }
.url { color:rgba(255,255,255,0.4); font-size:14px; letter-spacing:1px; }
.stats { display:flex; gap:32px; margin-top:20px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1); }
.stat-val { font-size:28px; font-weight:800; color:#E8A820; }
.stat-label { font-size:11px; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:1px; }
.top-badge { position:absolute; top:28px; left:28px; background:rgba(10,22,40,0.75); backdrop-filter:blur(10px); border:1px solid rgba(232,168,32,0.35); color:#E8A820; font-size:13px; font-weight:700; padding:10px 20px; border-radius:10px; letter-spacing:2px; text-transform:uppercase; }
</style>    <meta name="robots" content="noindex, nofollow">
</head>
<body>
<img class="bg" src="fb-bg.png">
<div class="top-badge">KOH PHANGAN SOLAR</div>
<div class="overlay">
  <div class="logo-row">
    <div class="logo-mark">TM</div>
    <div class="logo-text">TM <span>ENERGY</span></div>
  </div>
  <div class="headline">Cut Your Electricity Bill<br>by <em>70%</em> with Solar</div>
  <div class="sub">Premium LONGi panels &middot; Huawei inverters &middot; 25-year warranty<br>Free site survey &middot; Zero upfront PPA option available</div>
  <div><div class="cta">FREE ROOF ASSESSMENT &rarr;</div></div>
  <div class="stats">
    <div><div class="stat-val">3.8</div><div class="stat-label">Year Payback</div></div>
    <div><div class="stat-val">25</div><div class="stat-label">Year Warranty</div></div>
    <div><div class="stat-val">0</div><div class="stat-label">Upfront (PPA)</div></div>
  </div>
  <div class="url">bustan-energy.com</div>
</div>
</body></html>
