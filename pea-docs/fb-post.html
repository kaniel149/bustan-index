<!DOCTYPE html>
<html><head><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1080px; overflow:hidden; position:relative; font-family:-apple-system,sans-serif; }
.bg { width:100%; height:100%; object-fit:cover; }
.overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(10,22,40,0.85) 40%,rgba(10,22,40,0.95)); padding:60px 50px 50px; }
.logo-row { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
.logo-mark { width:48px; height:48px; background:#E8A820; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px; color:#0D2137; }
.logo-text { font-size:24px; font-weight:800; color:#fff; letter-spacing:2px; }
.logo-text span { color:#E8A820; }
.headline { font-size:42px; font-weight:800; color:#fff; line-height:1.2; margin-bottom:12px; }
.headline em { font-style:normal; color:#00D68F; }
.sub { font-size:18px; color:rgba(255,255,255,0.7); line-height:1.5; }
.badge { display:inline-block; background:rgba(0,214,143,0.15); border:1px solid rgba(0,214,143,0.3); color:#00D68F; font-size:13px; font-weight:700; padding:6px 16px; border-radius:100px; margin-top:16px; letter-spacing:1px; }
.top-badge { position:absolute; top:24px; left:24px; background:rgba(10,22,40,0.8); backdrop-filter:blur(8px); border:1px solid rgba(232,168,32,0.3); color:#E8A820; font-size:12px; font-weight:700; padding:8px 16px; border-radius:8px; letter-spacing:1.5px; text-transform:uppercase; }
</style></head>
<body>
<img class="bg" src="file:///tmp/fb-solar-post.png">
<div class="top-badge">☀️ KOH PHANGAN SOLAR</div>
<div class="overlay">
  <div class="logo-row">
    <div class="logo-mark">TM</div>
    <div class="logo-text">TM <span>ENERGY</span></div>
  </div>
  <div class="headline">Cut Your Electricity Bill<br>by <em>70%</em> with Solar</div>
  <div class="sub">Premium LONGi panels · Huawei inverters · 25-year warranty<br>Free site survey · Zero upfront PPA option available</div>
  <div class="badge">📍 FREE ROOF ASSESSMENT → LINK IN COMMENTS</div>
</div>
</body></html>
