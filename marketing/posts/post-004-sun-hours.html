<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koh Phangan Solar Fact — Bustan Energy</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter','Helvetica Neue',Arial,sans-serif;background:#E5E7EB;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .post{width:1080px;height:1080px;background:#F8F9FA;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
  
  .logo{position:absolute;top:36px;right:40px;height:44px}
  
  /* Top badge */
  .top-badge{position:absolute;top:40px;left:40px;display:flex;align-items:center;gap:10px}
  .top-badge .dot{width:10px;height:10px;border-radius:50%;background:#F27A1A}
  .top-badge span{font-size:.8rem;font-weight:700;color:#F27A1A;letter-spacing:1.5px;text-transform:uppercase}
  
  /* Header */
  .header{text-align:center;margin-bottom:20px}
  .header .tag{display:inline-block;background:#1B2A4A;color:#fff;padding:10px 28px;border-radius:24px;font-size:.85rem;font-weight:600;letter-spacing:1px;margin-bottom:20px}
  .header h1{font-size:2.2rem;color:#1B2A4A;font-weight:800}
  
  /* Big number */
  .big-number{text-align:center;margin:24px 0}
  .big-number .sun-icon{font-size:4rem;margin-bottom:8px}
  .big-number .number{font-size:12rem;font-weight:900;color:#F27A1A;line-height:.85;letter-spacing:-4px}
  .big-number .unit{font-size:2rem;font-weight:700;color:#1B2A4A;margin-top:8px}
  
  /* Stats row */
  .stats-row{display:flex;gap:24px;margin:32px 0}
  .stat-card{background:#fff;border:2px solid #E2E8F0;border-radius:20px;padding:28px 36px;text-align:center;min-width:220px}
  .stat-card .value{font-size:2rem;font-weight:800;color:#1B2A4A}
  .stat-card .value span{color:#00D68F}
  .stat-card .desc{font-size:.85rem;color:#64748B;margin-top:4px}
  
  /* Savings highlight */
  .savings{background:#1B2A4A;border-radius:20px;padding:24px 56px;text-align:center;margin-top:8px}
  .savings .text{font-size:1.5rem;font-weight:800;color:#fff}
  .savings .text span{color:#00D68F}
  
  /* Footer */
  .footer{position:absolute;bottom:40px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:24px}
  .footer .brand{font-size:1.1rem;font-weight:800;color:#1B2A4A}
  .footer .sep{width:1.5px;height:24px;background:#CBD5E1}
  .footer .site{font-size:.9rem;color:#64748B;font-weight:500}
  .footer .pill{background:#00D68F;color:#fff;padding:8px 20px;border-radius:12px;font-size:.85rem;font-weight:700}
</style>
</head>
<body>

<div class="post">
  <img class="logo" src="../../proposals/tm-logo.png" alt="Bustan Energy">
  
  <div class="top-badge">
    <div class="dot"></div>
    <span>Did You Know?</span>
  </div>
  
  <div class="header">
    <div class="tag">☀️ Koh Phangan Solar Fact</div>
    <h1>Peak Sun Hours Per Day</h1>
  </div>
  
  <div class="big-number">
    <div class="number">4.2</div>
    <div class="unit">Peak Sun Hours / Day</div>
  </div>
  
  <div class="stats-row">
    <div class="stat-card">
      <div class="value"><span>=</span> 15,000+</div>
      <div class="desc">kWh per year from a 10kW system</div>
    </div>
    <div class="stat-card">
      <div class="value"><span>฿</span>90,000+</div>
      <div class="desc">in annual electricity savings</div>
    </div>
  </div>
  
  <div class="savings">
    <div class="text">That's <span>฿90,000+</span> back in your pocket every year</div>
  </div>
  
  <div class="footer">
    <div class="brand">Bustan Energy</div>
    <div class="sep"></div>
    <div class="site">tm.energy</div>
    <div class="sep"></div>
    <div class="pill">Free Site Survey</div>
  </div>
</div>

</body>
</html>
